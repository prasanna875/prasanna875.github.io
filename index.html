<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saral AI — Simple Answers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Noto+Sans:wght@400;500;600&family=Noto+Sans+Devanagari:wght@400;500;600&family=Noto+Sans+Bengali:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  :root{
    --bg: #FFFFFF;
    --surface: #F7F7F8;
    --border: #E5E5E8;
    --ink: #2D2D33;
    --muted: #8A8A93;
    --accent: #10A37F;
    --accent-dark: #0D8C6D;
    --user-bubble: #EFF6F4;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    font-family: "Noto Sans","Noto Sans Devanagari","Noto Sans Bengali",sans-serif;
    background: var(--bg);
    color: var(--ink);
    height:100vh;
    display:flex;
    flex-direction:column;
  }
  header{
    display:flex;
    align-items:center;
    gap:10px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  header .logo{
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 18px;
    flex-shrink:0;
  }
  header h1{
    margin:0;
    font-family:"Poppins", sans-serif;
    font-weight:700;
    font-size: 18px;
    color: var(--ink);
  }
  header p{
    margin:0;
    font-size: 12px;
    color: var(--muted);
  }
  main{
    flex:1;
    overflow-y:auto;
    padding: 16px 0 8px;
  }
  .msg-row{
    display:flex;
    gap:10px;
    padding: 10px 16px;
    max-width: 720px;
    margin: 0 auto;
  }
  .msg-row.user{ justify-content:flex-end; }
  .avatar{
    width: 30px;
    height: 30px;
    border-radius: 8px;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 15px;
    background: var(--accent);
    color:#fff;
  }
  .msg-row.user .avatar{ display:none; }
  .msg{
    line-height:1.65;
    font-size: 15px;
    max-width: 78%;
  }
  .msg-row.user .msg{
    background: var(--user-bubble);
    border-radius: 14px;
    padding: 10px 14px;
  }
  .msg-row.ai .msg{
    background: transparent;
    padding: 4px 0;
  }
  .msg img{
    max-width: 100%;
    border-radius: 10px;
    margin-bottom: 6px;
    display:block;
  }
  .msg.loading{ color: var(--muted); font-style: italic; }

  /* Markdown styling inside AI replies */
  .msg p{ margin: 0 0 10px; }
  .msg p:last-child{ margin-bottom:0; }
  .msg ul, .msg ol{ margin: 0 0 10px; padding-left: 22px; }
  .msg li{ margin-bottom: 4px; }
  .msg h1, .msg h2, .msg h3{
    font-family:"Poppins", sans-serif;
    margin: 14px 0 8px;
    color: var(--ink);
  }
  .msg h1{ font-size: 19px; }
  .msg h2{ font-size: 17px; }
  .msg h3{ font-size: 15px; }
  .msg strong{ font-weight: 700; }
  .msg code{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 5px;
    font-size: 13px;
    font-family: "SFMono-Regular", Consolas, monospace;
  }
  .msg pre{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    overflow-x:auto;
    margin: 0 0 10px;
  }
  .msg pre code{ background:none; border:none; padding:0; }
  .msg blockquote{
    border-left: 3px solid var(--accent);
    margin: 0 0 10px;
    padding-left: 12px;
    color: var(--muted);
  }

  #preview-bar{
    display:none;
    align-items:center;
    gap:10px;
    padding: 10px 16px 0;
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
  }
  #preview-bar.show{ display:flex; }
  #preview-bar img, #preview-bar .file-icon{
    width: 52px;
    height: 52px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  #preview-bar .file-icon{
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: 22px;
    background: var(--surface);
  }
  #preview-bar .remove-img{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius:50%;
    width:24px;
    height:24px;
    font-size:13px;
    cursor:pointer;
    color: var(--ink);
  }

  form{
    display:flex;
    align-items:flex-end;
    gap:8px;
    padding: 12px 16px 16px;
    max-width: 720px;
    width:100%;
    margin: 0 auto;
  }
  .attach-btn{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 44px;
    height: 44px;
    font-size: 19px;
    cursor: pointer;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .attach-btn:hover{ background: var(--border); }
  textarea{
    flex:1;
    resize:none;
    border:1px solid var(--border);
    border-radius: 14px;
    padding: 11px 14px;
    font-size:15px;
    font-family: inherit;
    height: 44px;
    line-height:1.4;
    background: var(--surface);
  }
  textarea:focus{ outline: 1.5px solid var(--accent); }
  button.send{
    background: var(--accent);
    color: #fff;
    border:none;
    border-radius: 12px;
    padding: 0 20px;
    height: 44px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    font-family:"Poppins",sans-serif;
    flex-shrink:0;
  }
  button.send:hover{ background: var(--accent-dark); }
  button.send:disabled{ opacity:0.5; cursor:default; }

  .hint{
    text-align:center;
    color: var(--muted);
    font-size: 13px;
    margin-top: 60px;
    padding: 0 20px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">📘</div>
  <div>
    <h1>Saral AI</h1>
    <p>Simple answers in your language — study, life, anything you ask</p>
  </div>
</header>

<main id="chat">
  <div class="hint">Ask me anything — studies, life, feelings. Likho Hindi, Bengali ya English mein, jaise comfortable ho. 😊</div>
</main>

<div id="preview-bar">
  <img id="preview-img" src="" alt="preview" style="display:none">
  <div id="preview-file" class="file-icon" style="display:none">📄</div>
  <button type="button" class="remove-img" onclick="removeImage()">✕</button>
  <span id="preview-name" style="font-size:13px;color:var(--muted)">Attached</span>
</div>

<form id="form" onsubmit="sendMessage(event)">
  <input type="file" id="imageInput" accept="image/*,.pdf,application/pdf" style="display:none" onchange="handleImageSelect(event)">
  <button type="button" class="attach-btn" onclick="document.getElementById('imageInput').click()" title="Add photo or PDF">📎</button>
  <textarea id="input" placeholder="Type your question, or attach a photo..." ></textarea>
  <button class="send" type="submit" id="sendBtn">Send</button>
</form>

<script>
const SYSTEM_PROMPT = `You are Saral AI, a warm and friendly assistant for students, teenagers, and adults in India.
Your job is to explain ANYTHING the user asks — study topics, exam concepts, emotional struggles, life advice, daily problems — in the SIMPLEST possible way.

Rules you always follow:
- Reply in the SAME language/script the user wrote in (Hindi, Bengali, English, or a mix/Hinglish). Match their style naturally.
- Use short sentences, simple words, and everyday examples. Avoid jargon; if you must use a technical term, explain it in one simple line right after.
- For study questions: break down the explanation step by step, like a patient teacher. Use markdown formatting (headings, bold, bullet points) where it makes the answer clearer.
- For emotional or personal problems: be kind, supportive, and non-judgmental. Don't lecture. Validate feelings first, then gently offer practical, simple suggestions.
- Keep answers focused and not too long — clear and easy to read, not overwhelming.
- Be encouraging and friendly, like a helpful older sibling or favorite teacher.
- If the user sends a photo (e.g. of a textbook question, homework, diagram, or handwritten notes), read it carefully and explain or solve it in simple language, step by step.`;

const WORKER_URL = "https://summer-dew-ffcb.prasanogiri185.workers.dev";
const DAILY_LIMIT = 50;
let history = [];
let selectedImage = null; // { mimeType, base64, dataUrl, name, isImage }

function getUsage(){
  const today = new Date().toISOString().slice(0,10);
  let usage;
  try{
    usage = JSON.parse(localStorage.getItem('saral_usage'));
  }catch(e){ usage = null; }

  if(!usage || usage.date !== today){
    usage = { date: today, count: 0 };
  }
  return usage;
}

function incrementUsage(){
  const usage = getUsage();
  usage.count += 1;
  localStorage.setItem('saral_usage', JSON.stringify(usage));
  return usage.count;
}

function addMessage(text, role, imageDataUrl){
  const chat = document.getElementById('chat');

  const row = document.createElement('div');
  row.className = 'msg-row ' + role;

  if(role === 'ai'){
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '📘';
    row.appendChild(avatar);
  }

  const div = document.createElement('div');
  div.className = 'msg' + (role === 'loading' ? ' loading' : '');

  if(imageDataUrl){
    const img = document.createElement('img');
    img.src = imageDataUrl;
    div.appendChild(img);
  }

  if(text){
    if(role === 'ai'){
      const wrapper = document.createElement('div');
      wrapper.innerHTML = marked.parse(text);
      div.appendChild(wrapper);
    } else {
      const span = document.createElement('span');
      span.style.whiteSpace = 'pre-wrap';
      span.textContent = text;
      div.appendChild(span);
    }
  }

  row.appendChild(div);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function handleImageSelect(event){
  const file = event.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = function(e){
    const dataUrl = e.target.result;
    const base64 = dataUrl.split(',')[1];
    selectedImage = { mimeType: file.type, base64, dataUrl, name: file.name, isImage: file.type.startsWith('image/') };

    if(selectedImage.isImage){
      document.getElementById('preview-img').src = dataUrl;
      document.getElementById('preview-img').style.display = 'block';
      document.getElementById('preview-file').style.display = 'none';
      document.getElementById('preview-name').textContent = 'Photo attached';
    } else {
      document.getElementById('preview-img').style.display = 'none';
      document.getElementById('preview-file').style.display = 'flex';
      document.getElementById('preview-name').textContent = file.name;
    }
    document.getElementById('preview-bar').classList.add('show');
  };
  reader.readAsDataURL(file);
}

function removeImage(){
  selectedImage = null;
  document.getElementById('imageInput').value = '';
  document.getElementById('preview-bar').classList.remove('show');
}

async function sendMessage(e){
  e.preventDefault();
  const input = document.getElementById('input');
  const text = input.value.trim();
  if(!text && !selectedImage) return;

  const usage = getUsage();
  if(usage.count >= DAILY_LIMIT){
    addMessage(`Aapne aaj ke ${DAILY_LIMIT} messages ka limit pura kar liya hai. Kal phir try karo! 😊\n\nYou've reached today's limit of ${DAILY_LIMIT} messages. Please come back tomorrow!`, 'ai');
    return;
  }

  const parts = [];
  if(selectedImage){
    parts.push({ inline_data: { mime_type: selectedImage.mimeType, data: selectedImage.base64 } });
  }
  if(text){
    parts.push({ text });
  }

  const displayText = selectedImage && !selectedImage.isImage
    ? `📄 ${selectedImage.name}${text ? '\n' + text : ''}`
    : text;

  addMessage(displayText, 'user', (selectedImage && selectedImage.isImage) ? selectedImage.dataUrl : null);
  history.push({ role: 'user', parts });

  input.value = '';
  removeImage();

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  const loadingRow = addMessage('Thinking...', 'ai');
  loadingRow.querySelector('.msg').classList.add('loading');

  try{
    const res = await fetch(
      WORKER_URL,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: history,
          systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
        })
      }
    );
    const data = await res.json();
    loadingRow.remove();

    if(data.error){
      addMessage('Error: ' + data.error.message, 'ai');
      return;
    }

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sorry, I could not generate a response.';
    addMessage(reply, 'ai');
    history.push({ role: 'model', parts: [{ text: reply }] });
    incrementUsage();

  }catch(err){
    loadingRow.remove();
    addMessage('Network error. Please check your internet connection and try again.', 'ai');
  }finally{
    sendBtn.disabled = false;
  }
}

document.getElementById('input').addEventListener('keydown', function(e){
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    document.getElementById('form').requestSubmit();
  }
});
</script>

</body>
</html>
